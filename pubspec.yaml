name: notes_app
description: A beautiful Notes App with Clean Architecture
publish_to: 'none'
version: 1.4.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  dartz: ^0.10.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_launcher_icons: ^0.14.4
  flutter_quill: ^11.5.0
  flutter_screenutil: ^5.9.3
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.2
  uuid: ^4.2.1

dev_dependencies:
  build_runner: ^2.4.8

  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1

flutter_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets: null
  # - assets/images/
